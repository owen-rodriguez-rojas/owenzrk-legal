<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OwenZrk Studio Legal</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: #ffffff;
      --text: #1d2430;
      --muted: #5f6b7a;
      --border: #dfe5ee;
      --accent: #1f6feb;
      --accent-dark: #1557bd;
      --shadow: 0 14px 36px rgba(21, 35, 54, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(100% - 32px, 960px);
      margin: 0 auto;
      padding: 56px 0;
    }

    header {
      margin-bottom: 36px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent-dark);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 620px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 1.1rem;
    }

    main {
      display: grid;
      gap: 24px;
    }

    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h2 {
      margin: 0 0 18px;
      font-size: 1.35rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .app-card {
      display: block;
      min-height: 168px;
      padding: 22px;
      text-decoration: none;
      background: #fbfcfe;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .app-card:hover,
    .app-card:focus-visible {
      border-color: rgba(31, 111, 235, 0.55);
      box-shadow: 0 12px 28px rgba(31, 111, 235, 0.12);
      transform: translateY(-2px);
      outline: none;
    }

    .app-card h3 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .app-card p {
      margin: 0;
      color: var(--muted);
    }

    .link-label {
      display: inline-block;
      margin-top: 20px;
      color: var(--accent-dark);
      font-weight: 700;
    }

    footer {
      margin-top: 36px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 24px, 960px);
        padding: 32px 0;
      }

      section {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <p class="eyebrow">OwenZrk Studio</p>
      <h1>OwenZrk Studio Legal</h1>
      <p class="subtitle">Políticas y documentos legales de nuestras apps.</p>
    </header>

    <main>
      <section aria-labelledby="apps-title">
        <h2 id="apps-title">Apps disponibles</h2>
        <div class="apps">
          <a class="app-card" href="randomiza-facil/privacy-policy.html">
            <h3>Randomiza Fácil</h3>
            <p>Política de privacidad de la app Android Randomiza Fácil.</p>
            <span class="link-label">Ver política de privacidad</span>
          </a>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 OwenZrk Studio. Documentos legales para apps Android.</p>
    </footer>
  </div>
</body>
</html>
